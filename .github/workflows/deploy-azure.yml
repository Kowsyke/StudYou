name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client
        run: pnpm --filter @studyou/client build

      - name: Bundle server for Node
        run: |
          cd apps/server
          bun build src/node.ts --target node --outdir ../../deploy
          cd ../..
          cp -r apps/client/dist deploy/client-dist
          cat > deploy/package.json <<'PKG'
          {
            "name": "studyou-deploy",
            "private": true,
            "type": "module",
            "scripts": { "start": "node node.js" }
          }
          PKG

      # Deploy via the Kudu zip-deploy endpoint using SCM basic auth. This is
      # the same path `az webapp deploy` uses and needs no directory/app
      # registration permissions (which Azure for Students accounts lack).
      - name: Deploy to Azure (Kudu zip deploy)
        env:
          SCM_PASSWORD: ${{ secrets.AZURE_SCM_PASSWORD }}
        run: |
          cd deploy && zip -qr ../app.zip . && cd ..
          echo "SCM password length (should be > 0): ${#SCM_PASSWORD}"
          code=$(curl -sS -w '%{http_code}' -o /tmp/kudu.txt -X POST \
            --user "\$studyou-app-7097:$SCM_PASSWORD" \
            --data-binary @app.zip \
            -H 'Content-Type: application/zip' \
            "https://studyou-app-7097.scm.azurewebsites.net/api/zipdeploy?isAsync=false")
          echo "Kudu HTTP status: $code"
          echo "Kudu response:"; cat /tmp/kudu.txt 2>/dev/null || true; echo
          case "$code" in 2*) echo "deploy ok" ;; *) echo "deploy FAILED (see status above)"; exit 1 ;; esac
